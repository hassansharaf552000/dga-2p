<button
  class="{{ buttonClasses.join(' ') }}"
  [disabled]="isDisabled"
  [attr.aria-label]="iconOnly ? label : null"
  [attr.dir]="rtl ? 'rtl' : 'ltr'">
  @if (showLeadIcon) {
    <span class="dga-button__icon" aria-hidden="true">
      <img [src]="leadIconUrl" [alt]="''" />
    </span>
  }
  @if (!iconOnly) {
    <span class="dga-button__label" dir="auto">{{ label }}</span>
  }
  @if (showTrailIcon) {
    <span class="dga-button__icon" aria-hidden="true">
      <img [src]="trailIconUrl" [alt]="''" />
    </span>
  }
</button>
