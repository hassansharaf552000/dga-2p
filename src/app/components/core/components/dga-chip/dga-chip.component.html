<button
  class="{{ chipClasses.join(' ') }}"
  type="button"
  [attr.dir]="rtl ? 'rtl' : null"
  [attr.aria-label]="computedAriaLabel"
  [attr.aria-pressed]="selectable ? isSelected : null"
  [disabled]="isDisabled"
  (click)="onChipClick()"
  (keydown)="onKeydown($event)"
>
  @if (showLeadIcon) {
    <span class="dga-chip__icon dga-chip__icon--lead" aria-hidden="true"></span>
  }
  <span class="dga-chip__label">{{ label }}</span>
  @if (showTrailIcon) {
    <span
      class="dga-chip__icon dga-chip__icon--trail"
      [class.dga-chip__icon--remove]="removable"
      aria-hidden="true"
      (click)="removable ? onRemoveClick($event) : null"
    ></span>
  }
</button>
