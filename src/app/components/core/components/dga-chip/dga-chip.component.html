<button
  class="{{ chipClasses }}"
  type="button"
  [attr.dir]="rtl ? 'rtl' : null"
  [disabled]="isDisabled">
  @if (showLeadIcon) {
    <span class="dga-chip__icon dga-chip__icon--lead" aria-hidden="true">
      <img [src]="leadIconUrl" alt="" />
    </span>
  }
  <span class="dga-chip__label">{{ label }}</span>
  @if (showTrailIcon) {
    <span class="dga-chip__icon dga-chip__icon--trail" aria-hidden="true">
      <img [src]="trailIconUrl" alt="" />
    </span>
  }
</button>
