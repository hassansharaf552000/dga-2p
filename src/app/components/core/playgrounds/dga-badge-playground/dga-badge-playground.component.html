<dga-playground [config]="playgroundConfig" [componentProps]="componentProps">
  <dga-badge
    [count]="componentProps.count"
    [maxCount]="componentProps.maxCount"
    [variant]="componentProps.variant"
    [color]="componentProps.color"
    [showZero]="componentProps.showZero">
  </dga-badge>
</dga-playground>
