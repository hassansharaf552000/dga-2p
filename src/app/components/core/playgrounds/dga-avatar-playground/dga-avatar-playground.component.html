<dga-playground [config]="playgroundConfig" [componentProps]="componentProps">
  <dga-avatar
    [type]="componentProps.type"
    [src]="componentProps.src"
    [alt]="componentProps.alt"
    [initials]="componentProps.initials"
    [size]="componentProps.size"
    [shape]="componentProps.shape"
    [border]="componentProps.border">
  </dga-avatar>
</dga-playground>
