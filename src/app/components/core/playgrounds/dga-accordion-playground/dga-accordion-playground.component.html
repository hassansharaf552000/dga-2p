<dga-playground [config]="playgroundConfig" [componentProps]="componentProps">
  <dga-accordion
    [title]="componentProps.title"
    [content]="componentProps.content"
    [expanded]="componentProps.expanded"
    [disabled]="componentProps.disabled"
    [size]="componentProps.size"
    [state]="componentProps.state"
    [iconAlignment]="componentProps.iconAlignment"
    [flush]="componentProps.flush"
    [rtl]="componentProps.rtl">
  </dga-accordion>
</dga-playground>
