<div class="slider" [class.slider--disabled]="disabled">
  @if (label) {
    <div class="slider__header">
      <label class="slider__label">{{ label }}</label>
      @if (showValue) {
        <span class="slider__value">{{ value }}</span>
      }
    </div>
  }
  <input 
    type="range" 
    class="slider__input"
    [value]="value"
    [min]="min"
    [max]="max"
    [step]="step"
    [disabled]="disabled" />
</div>
