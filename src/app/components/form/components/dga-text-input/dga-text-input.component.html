<div class="text-input text-input--{{ size }}" [class.text-input--error]="error" [class.text-input--disabled]="disabled">
  @if (label) {
    <label class="text-input__label">{{ label }}</label>
  }
  <input 
    type="text" 
    class="text-input__field" 
    [placeholder]="placeholder"
    [value]="value"
    [disabled]="disabled" />
  @if (error) {
    <span class="text-input__error">{{ error }}</span>
  } @else if (helperText) {
    <span class="text-input__helper">{{ helperText }}</span>
  }
</div>
