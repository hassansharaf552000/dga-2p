<div class="dropdown" [class.dropdown--error]="error" [class.dropdown--disabled]="disabled">
  @if (label) {
    <label class="dropdown__label">{{ label }}</label>
  }
  <select class="dropdown__select" [disabled]="disabled">
    <option value="" disabled [selected]="!value">{{ placeholder }}</option>
    @for (option of options; track option) {
      <option [value]="option" [selected]="option === value">{{ option }}</option>
    }
  </select>
  @if (error) {
    <span class="dropdown__error">{{ error }}</span>
  }
</div>
