<dga-playground [config]="playgroundConfig" [componentProps]="componentProps">
  <dga-checkbox
    [label]="componentProps.label"
    [checked]="componentProps.checked"
    [indeterminate]="componentProps.indeterminate"
    [disabled]="componentProps.disabled"
    [size]="componentProps.size"
    [style]="componentProps.style"
    [state]="componentProps.state"
    [rtl]="componentProps.rtl">
  </dga-checkbox>
</dga-playground>
