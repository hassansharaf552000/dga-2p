<dga-playground [config]="playgroundConfig" [componentProps]="componentProps">
  <dga-metric
    [label]="componentProps.label"
    [value]="componentProps.value"
    [unit]="componentProps.unit"
    [trend]="componentProps.trend"
    [trendValue]="componentProps.trendValue"
    [description]="componentProps.description">
  </dga-metric>
</dga-playground>
