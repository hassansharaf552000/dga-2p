<dga-playground [config]="playgroundConfig" [componentProps]="componentProps">
  <dga-code-snippet
    [type]="componentProps.type"
    [prefix]="componentProps.prefix"
    [code]="componentProps.code"
    [tabs]="tabsList"
    [showCopyButton]="componentProps.showCopyButton"
    [showTabList]="componentProps.showTabList"
    [showSidebar]="componentProps.showSidebar"
    [showShowMore]="componentProps.showShowMore">
  </dga-code-snippet>
</dga-playground>
