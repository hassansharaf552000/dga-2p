<dga-playground [config]="playgroundConfig" [componentProps]="componentProps">
  <dga-table
    [columns]="componentProps.columns"
    [data]="componentProps.data"
    [striped]="componentProps.striped"
    [bordered]="componentProps.bordered"
    [hoverable]="componentProps.hoverable"
    [compact]="componentProps.compact">
  </dga-table>
</dga-playground>
