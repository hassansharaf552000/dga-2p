<dga-playground [config]="playgroundConfig" [componentProps]="componentProps">
  <dga-breadcrumb
    [items]="componentProps.items"
    [separator]="componentProps.separator"
    [showHome]="componentProps.showHome"
    [rtl]="componentProps.rtl"
    [useIconSeparator]="componentProps.useIconSeparator"
    [maxItems]="componentProps.maxItems">
  </dga-breadcrumb>
</dga-playground>
