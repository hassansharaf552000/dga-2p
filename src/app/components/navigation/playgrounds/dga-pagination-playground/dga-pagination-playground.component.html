<dga-playground [config]="playgroundConfig" [componentProps]="componentProps">
  <dga-pagination
    [totalItems]="componentProps.totalItems"
    [itemsPerPage]="componentProps.itemsPerPage"
    [currentPage]="componentProps.currentPage"
    [size]="componentProps.size"
    [showFirstLast]="componentProps.showFirstLast"
    [showPageSize]="componentProps.showPageSize"
    [maxVisiblePages]="componentProps.maxVisiblePages">
  </dga-pagination>
</dga-playground>
