<div class="loading loading--{{ variant }} loading--{{ size }}" [class.loading--overlay]="overlay">
  <div class="loading__indicator" [style.color]="color">
    @if (variant === 'spinner') {
      <div class="spinner"></div>
    } @else if (variant === 'dots') {
      <div class="dots">
        <span></span><span></span><span></span>
      </div>
    } @else if (variant === 'bar') {
      <div class="bar"></div>
    } @else if (variant === 'pulse') {
      <div class="pulse"></div>
    }
  </div>
  @if (label) {
    <span class="loading__label">{{ label }}</span>
  }
</div>
