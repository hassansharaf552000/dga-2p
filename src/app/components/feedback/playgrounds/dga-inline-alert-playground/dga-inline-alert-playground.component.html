<dga-playground [config]="playgroundConfig" [componentProps]="componentProps">
  <dga-inline-alert
    [title]="componentProps.title"
    [message]="componentProps.message"
    [variant]="componentProps.variant"
    [dismissible]="componentProps.dismissible"
    [showIcon]="componentProps.showIcon">
  </dga-inline-alert>
</dga-playground>
