<dga-playground [config]="playgroundConfig" [componentProps]="componentProps">
  <dga-modal
    [title]="componentProps.title"
    [size]="componentProps.size"
    [showHeader]="componentProps.showHeader"
    [showFooter]="componentProps.showFooter"
    [showClose]="componentProps.showClose"
    [primaryAction]="componentProps.primaryAction"
    [secondaryAction]="componentProps.secondaryAction">
  </dga-modal>
</dga-playground>
